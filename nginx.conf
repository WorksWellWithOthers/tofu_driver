server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "accelerometer=(self), camera=(), geolocation=(self), gyroscope=(self), microphone=(), payment=(), usb=()" always;

  location / {
    try_files $uri /index.html;
  }

  location /static/ {
    try_files $uri =404;
  }
}
